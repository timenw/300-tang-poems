name: Build Android

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant gradlew permission
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --info 2>&1 | tee build.log; echo "GRADLE_EXIT=$?"

      - name: Show build results
        if: always()
        run: |
          echo "=== BUILD LOG (last 50 lines) ==="
          tail -50 build.log 2>/dev/null || echo "No build.log"
          echo "=== APK files ==="
          find . -name "*.apk" -type f 2>/dev/null || echo "No .apk found"
          echo "=== app/build tree ==="
          find app/build -maxdepth 4 -type f 2>/dev/null | head -50
          echo "=== app/build/outputs ==="
          ls -laR app/build/outputs/ 2>/dev/null || echo "No outputs dir"

      - name: Upload Debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: "**/*.apk"
          retention-days: 30
          if-no-files-found: warn
