name: Build Android

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant gradlew permission
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --info 2>&1 | tee build.log

      - name: Print build log on failure
        if: failure()
        run: |
          echo "=== BUILD FAILED - LAST 200 LINES ==="
          tail -200 build.log || true
          echo "=== SEARCHING FOR ERRORS ==="
          grep -iE "error:|e:|FAILURE|Exception|Unresolved|Cannot|Type mismatch|No value|Could not|compilation" build.log | head -50 || true

      - name: Upload Debug APK
        if: github.event_name == 'push' && success()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
